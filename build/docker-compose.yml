version: '3.3'
services:
  authService:
    build: 
      context: ./../
      dockerfile: build/authService/Dockerfile
    image: authservice
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      - db
    entrypoint: [./main]
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: timofey
      POSTGRES_PASSWORD: nbvjatq
    ports:
      - '5433:5432'
    volumes: 
      - /database_data:/var/lib/postgresql/data/